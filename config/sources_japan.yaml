# =============================================================================
# sources_japan.yaml  --  FRED/BEA/BLS -> e-Stat mapping for the Japan CPI port
# =============================================================================
# Mirrors sources_europe.yaml / sources_uk.yaml. Items flagged "VALIDATE" need
# a first authenticated run (or sign-off) to pin exact e-Stat codes.
#
# ACCESS: the e-Stat API requires a FREE application ID. Register at
#   https://www.e-stat.go.jp/api/  (My Page -> API)
# and set ESTAT_API_ID=... in .env. Without it the jp backbone is skipped
# gracefully (exporter prints why); everything else still builds.
# =============================================================================

meta:
  geo: "JP"
  api_guide: "https://www.e-stat.go.jp/api/api-info/api-guide"
  client: "ism.estat.EstatClient"
  app_id_env: "ESTAT_API_ID"
  note: >
    The category engine is unchanged; only the data plumbing differs. Japan's
    CPI item classification is flat 4-digit codes (cat01) whose hierarchy is
    carried by the @level attribute in the API's CLASS_INF metadata -- the
    pipeline selects a level dynamically (the analogue of the BEA line level /
    COICOP-depth cut), rather than pinning a CSV.

# -----------------------------------------------------------------------------
# CORE category data (the heart of the index)
# -----------------------------------------------------------------------------
category_prices:
  us: "BEA 2.4.4U PCE price indexes / BLS CUUR0000* item strata"
  jp_table: "0003427113"   # 2020-base CPI, Japan (zenkoku), monthly, by item (cat01)
  jp_source: "e-Stat getStatsData, statsCode 00200573 (Statistics Bureau CPI)"
  selection: "medium-group (chu-bunrui) = direct children of the 10 major groups, walked from the cat01 parent tree; 47 categories"
  confidence: high
  flag: CONFIRMED
  note: >
    Table id pinned from the official API news (cpi-info202107). CONFIRMED on
    the first authenticated run (2026-06): the cat01 dimension packs THREE
    overlapping hierarchies into one flat code space -- the major-group tree, a
    goods/services recut (財 / サービス) and supplementary 再掲 / seasonally-
    adjusted aggregates -- and its @level attribute is NOT consistent across
    them, so no single @level is a clean partition (a level cut double-counts and
    even pulls in seasonally-adjusted duplicates). We therefore tile the index by
    the medium groups (中分類) = the direct children of the 10 major groups, walked
    from the parent tree: mutually exclusive and exhaustive (all ~580 items roll
    up to exactly one; 47 categories, monthly back to 1970-01). See
    ism.jp_pipeline.select_cat01_partition. Item level (~580 series) only spans
    the current base; the medium-group cut is the right depth-vs-history
    trade-off, as the class level was for the UK.

category_weights:
  us: "BEA 2.4.5U nominal PCE / BLS relative importance"
  jp: "CPI weights (per 10000) -- fixed per 5-year base revision (Laspeyres)"
  retrieval: "tab dimension of the same table if present, else the companion weights table discovered via getMetaInfo; else static vector pinned after first run"
  jp_source: "e-Stat 2020-base CPI Annual Report, Appendix 1 'List of CPI Items' (statInfId 000032177686), 総合/Japan weight column (per 10000)"
  confidence: high
  flag: CONFIRMED
  note: >
    CONFIRMED + WIRED (2026-06). Table 0003427113 exposes only three tabs (指数
    index, 前月比, 前年同月比) -- there is NO weights tab, and a getStatsList search
    under statsCode 00200573 surfaces no 2020-base weights DB table. The official
    weights live in FILE datasets (Annual Report appendices, PDF only). We pin the
    static 2020-base 中分類 weight vector (per 10000, Laspeyres) transcribed from
    the CPI Item Information List (Appendix 1, statInfId 000032177686) into
    ism.jp_pipeline.JP_CPI_WEIGHTS_2020, broadcast across months and renormalised
    monthly -- the same fixed-base treatment as the US CPI backbone's Dec-2023
    relative importance. Validation: the 10 major groups sum to exactly 10000 and
    each major reconciles with the sum of its medium-group children to within the
    integer-rounding of the published shares (47 mediums sum to 10004). The COICOP
    weights appendix (Appendix 5, statInfId 000032177690) is a DIFFERENT
    classification (外食/酒類 sit elsewhere) and is NOT used.

# -----------------------------------------------------------------------------
# Headline inflation (target + control)
# -----------------------------------------------------------------------------
headline_inflation:
  us: "PCEPI / CUUR0000SA0 (yoy, 3m)"
  jp: "cat01 0001 'Sogo' (all items) from the same table -> compute yoy & 3m"
  alt: "0002* all items less fresh food ('core') is the BoJ's preferred gauge -- a UI option later"
  confidence: high

# -----------------------------------------------------------------------------
# Controls (Table 1 / LP / LASSO) -- notebook only; NOT needed for the web app
# -----------------------------------------------------------------------------
controls:
  inflation_expectations_1y:
    us: "Michigan 1-yr expected inflation (MICH)"
    jp: "Cabinet Office Consumer Confidence Survey, 1-year price expectations (monthly, 2004+); BoJ Tankan output-price DI (quarterly, longer) as alt"
    confidence: medium
    flag: VALIDATE

  unemployment:
    us: "UNRATE"
    jp: "LFS unemployment rate, FRED LRUNTTTTJPM156S (monthly, SA, 1955+)"
    confidence: high

  vacancies:
    us: "JOLTS / Barnichon V/U"
    jp: "Active job openings-to-applicants ratio (yuko kyujin bairitsu, MHLW, monthly 1963+) -- Japan's standard labour-tightness gauge, used directly in place of V/U"
    confidence: medium
    note: "Different construction (openings/applicants at PES offices, not vacancies/unemployed) but the canonical Japanese analogue with long history. FRED: JPNJVR or via e-Stat."

  oil_price:
    us: "WTI spot (WTISPLC)"
    jp: "Brent/global crude (FRED MCOILBRENTEU) or Japan CIF crude import price"
    confidence: high

  equity_index:
    us: "S&P 500 (Shiller)"
    jp: "Nikkei 225 (FRED NIKKEI225, daily from 1949 -> monthly mean)"
    fallback: "Shiller S&P 500 per the standing user rule, but Nikkei is freely on FRED so the fallback should rarely bind"
    confidence: high

  real_disposable_income:
    us: "DSPIC96"
    jp: "Cabinet Office SNA household disposable income (QUARTERLY) deflated by CPI -> yoy, interpolated"
    confidence: medium
    flag: VALIDATE

  yield_spread:
    us: "GS10 - FEDFUNDS"
    jp: "10y JGB yield (FRED IRLTLT01JPM156N, 1989+) minus uncollateralised overnight call rate (FRED IRSTCI01JPM156N, 1985+)"
    alt: "BoJ time-series portal for longer 10y history (1986+) / discount rate for pre-1985"
    confidence: medium
    note: "Spread history starts ~1989 -- fine if the panel cut starts 1970 but shortens with-controls regressions."

  recession_dummy:
    us: "USREC (NBER)"
    jp: "Cabinet Office ESRI official business-cycle reference dates (Japan HAS an official dating committee) -- manual list in ism.jp_pipeline"
    confidence: high

# -----------------------------------------------------------------------------
# External identified shocks (Section 5 validation) -- future / VALIDATE
# -----------------------------------------------------------------------------
external_shocks:
  monetary_policy:
    us: "Romer-Romer attempted-disinflation dates"
    jp: "no canonical JP narrative series; candidates: Braun-Shioji style high-frequency surprises, or BoJ tightening episodes (manual)"
    confidence: low
    flag: VALIDATE

  oil_supply_news:
    us: "Kanzig (2021) oil supply news shock"
    jp: "same Kanzig series (global shock)"
    confidence: high

# =============================================================================
# MODEL 2 -- SUPPLY/DEMAND DECOMPOSITION (quarterly SNA consumption by type)
# =============================================================================
# The second model (Shapiro 2022-18) needs category QUANTITY as well as price,
# which the monthly CPI does not carry. Japan's quarterly SNA (Cabinet Office
# 四半期別GDP速報 / QE) publishes household final consumption by "form" (type) in
# both nominal (current-yen) and real (chained 2020-yen), from which the port
# forms an implicit deflator and a real quantity per category. Loader:
# ism.estat.jp_hce_panels -> ism.decomp_ports.build_jp_panels (PORTS["jp"]),
# run with the quarterly baseline DecompConfig(var_lags=4, window=40,
# periods_per_year=4). Same e-Stat client + ESTAT_API_ID as the CPI backbone.
decomposition:
  statistics:
    code: "00100409"
    name: "国民経済計算 四半期別GDP速報 (Cabinet Office QE), 2020 calendar-year base"
  nominal_table:
    id: "0003109753"
    title: "形態別国内家計最終消費支出 名目季節調整系列（1994年1Q～）2020暦年基準"
  real_table:
    id: "0003109790"
    title: "形態別国内家計最終消費支出 実質季節調整系列（1994年1Q～）2020暦年基準"
  categories:
    dimension: "cat01 (形態別国内家計最終消費支出)"
    leaves:
      "15": "耐久財 / durable goods"
      "16": "半耐久財 / semi-durable goods"
      "17": "非耐久財 / non-durable goods"
      "18": "サービス / services"
    note: >
      Only four leaf "form" categories are available quarterly — a deliberately
      COARSE cross-section (cf. the coarse France A17 port). cat01 also carries
      the total (14 = 国内家計最終消費支出) and residents-abroad adjustments
      (11/12/13), which the loader drops. price = 100·nominal/real (implicit
      deflator); quantity = real chained series; weights = nominal shares.
  frequency: "quarterly, seasonally adjusted, 1994Q1 onward"
  time_codes: "'1994000103' = 1994 Q1 (year + start-month..end-month); parsed by ism.estat._jp_quarter_to_timestamp"
  confidence: high
  flag: CONFIRMED
  note: >
    CONFIRMED on an authenticated run (2026-07): builds 4 categories × 129
    quarters (1994Q1–2026Q1); the decomposition peaks total y/y inflation at
    ~4.2% in 2022Q4 (matching Japan's post-pandemic peak) and eases back toward
    ~2% by 2025. If a future SNA base rebases the ids, refresh them via
    getStatsList(statsCode=00100409, searchWord="形態別国内家計最終消費支出 …季節調整系列").
  refresh: "self-fetched by ism.estat.jp_hce_panels via EstatClient (cached under data/raw/estat/); no separate fetch script needed"
