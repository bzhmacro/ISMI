[pytest]
# The repo lives on a Dropbox-synced mount where stale __pycache__ files can
# become unwritable. Redirect bytecode + pytest caches to a writable temp dir
# and import test modules in isolation so tests always run against live source.
addopts = -p no:cacheprovider --import-mode=importlib
cache_dir = /tmp/pytest_cache
testpaths = tests
